<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="Author" content="Ryan Sá" />
    <meta name="description" content="Entre em contato com a Ford e saiba mais sobre a nova Ranger 2022. Preencha o formulário e fale com um de nossos especialistas." />
    <title>Contato - Ford Ranger 2022</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="site-header">
      <nav class="site-header__logo">
        <a href="index.html">
          <img src="img/logo-ford-256.png" alt="Logo da Ford" width="150" />
        </a>
      </nav>

      <nav class="site-header__nav">
        <a href="index.html">Home</a> /
        <a href="lancamento.html">Lançamento</a> /
        <a href="contato.html">Contato</a>
      </nav>
    </header>

    <main class="site-main">
      <section class="contact">
        <div class="contact__image">
          <img src="img/xls 2.2 diesel.jpg" alt="Ford Ranger" />
        </div>

        <form class="contact__form">
          <h3>Sobre você</h3>

          <input type="text" placeholder="Nome*" required />

          <input type="text" placeholder="Sobrenome*" required />

          <input type="email" placeholder="E-mail*" required />

          <input type="text" placeholder="CPF*" required />

          <input type="tel" placeholder="Telefone*" required />

          <select name="contato">
            <option value="">Como deseja ser contatado</option>
            <option value="email">Email</option>
            <option value="telefone">Telefone</option>
          </select>

          <textarea placeholder="Mensagem"></textarea>

          <button type="submit">Enviar</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer__social">
        <span class="site-footer__social-label">Redes Sociais:</span>

        <a href="https://www.facebook.com/ford" target="_blank">
          <img src="img/facebook-50.png" alt="Facebook Logo" width="30" />
        </a>

        <a href="https://www.instagram.com/ford" target="_blank">
          <img
            src="img/instagram-logo-50.png"
            alt="Instagram Logo"
            width="30"
          />
        </a>

        <a href="https://www.youtube.com/ford" target="_blank">
          <img src="img/youtube-squared-50.png" alt="YouTube Logo" width="30" />
        </a>
      </div>

      <section class="site-footer__copyright">
        <p>&copy; 2022 Ford Motor Company. Todos os direitos reservados.</p>
      </section>

      <img class="site-footer__logo" src="img/ford-96.png" alt="Ford Logo" />
    </footer>
  </body>
</html>
