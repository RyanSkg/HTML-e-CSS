<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Ryan Sá" />
    <meta
      name="description"
      content="Veja o vídeo de lançamento e compare os modelos da nova Ford Ranger 2022: XL, XLS e Storm."
    />
    <title>Lançamento - Ford Ranger 2022</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="site-header">
      <nav class="site-header__logo">
        <a href="index.html">
          <img src="img/logo-ford-256.png" alt="Logo da Ford" width="150" />
        </a>
      </nav>

      <nav class="site-header__nav">
        <a href="index.html">Home</a> /
        <a href="lancamento.html">Lançamento</a> /
        <a href="contato.html">Contato</a>
      </nav>
    </header>

    <main class="pagina-lancamento">
      <div class="video-container">
        <iframe
          src="https://www.youtube.com/embed/vQsryuNmsL0?autoplay=1&mute=1&controls=0&loop=1&playlist=vQsryuNmsL0"
          title="YouTube video player"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
          "
          allowfullscreen
        ></iframe>
      </div>

      <p class="hero-section__texto">
        Confira o vídeo de lançamento da nova Ford Ranger 2022. Para mais
        detalhes, visite o site oficial da Ford
        <a href="https://www.ford.com.br/picapes/ranger/" target="_blank"
          >aqui!</a
        >
      </p>

      <div class="grade-veiculos">
        <label class="veiculo-card">
          <img src="img/XL Cabine.jpg" alt="Ford Ranger XL" />
          <input type="checkbox" />
          <span class="veiculo-card__checkbox"></span>
          <p class="veiculo-card__nome">Ranger XL</p>
          <p class="veiculo-card__preco">R$ 189.990</p>
        </label>

        <label class="veiculo-card">
          <img src="img/xls 2.2 diesel.jpg" alt="Ford Ranger XLS" />
          <input type="checkbox" />
          <span class="veiculo-card__checkbox"></span>
          <p class="veiculo-card__nome">Ranger XLS</p>
          <p class="veiculo-card__preco">R$ 209.990</p>
        </label>

        <label class="veiculo-card">
          <img src="img/storm.jpg" alt="Ford Ranger Storm" />
          <input type="checkbox" />
          <span class="veiculo-card__checkbox"></span>
          <p class="veiculo-card__nome">Ranger Storm</p>
          <p class="veiculo-card__preco">R$ 229.990</p>
        </label>
      </div>

      <button class="btn-comparar">Comparar Carros</button>
    </main>

    <footer class="rodape">
      <div class="rodape__redes">
        <span class="rodape__redes-titulo">Redes Sociais:</span>

        <a href="https://www.facebook.com/ford" target="_blank">
          <img src="img/facebook-50.png" alt="Facebook Logo" width="30" />
        </a>

        <a href="https://www.instagram.com/ford" target="_blank">
          <img
            src="img/instagram-logo-50.png"
            alt="Instagram Logo"
            width="30"
          />
        </a>

        <a href="https://www.youtube.com/ford" target="_blank">
          <img src="img/youtube-squared-50.png" alt="YouTube Logo" width="30" />
        </a>
      </div>

      <section class="rodape__copyright">
        <p>&copy; 2022 Ford Motor Company. Todos os direitos reservados.</p>
      </section>

      <img class="rodape__logo" src="img/ford-96.png" alt="Ford Logo" />
    </footer>
  </body>
</html>
